components:
  schemas:
    AzureSQLDestinationConfig:
      properties:
        type:
          type: string
          enum:
          - AzureSQLNodeDestinationManager
          const: AzureSQLNodeDestinationManager
          title: Type
          default: AzureSQLNodeDestinationManager
        server:
          type: string
          title: Server
        database:
          type: string
          title: Database
        username:
          type: string
          title: Username
        password:
          type: string
          title: Password
        table_name:
          type: string
          title: Table Name
        port:
          type: integer
          title: Port
          default: 1433
        dimension_threshold:
          anyOf:
          - type: integer
          - type: 'null'
          title: Dimension Threshold
          default: 384
        filename_key:
          type: string
          title: Filename Key
          default: filename
        text_key:
          type: string
          title: Text Key
          default: text
        id_key:
          type: string
          title: Id Key
          default: id
        driver:
          anyOf:
          - type: string
          - type: 'null'
          title: Driver
        create_new_table:
          type: boolean
          title: Create New Table
          default: false
      type: object
      required:
      - server
      - database
      - username
      - password
      - table_name
      title: AzureSQLDestinationConfig
    BaseTag:
      properties:
        name:
          type: string
          title: Name
        values:
          items:
            anyOf:
            - type: string
            - type: number
            - type: integer
          type: array
          title: Values
          default: []
        operator:
          anyOf:
          - type: string
          - type: 'null'
          title: Operator
          default: any
      type: object
      required:
      - name
      title: BaseTag
    BasicMetadataRequest:
      properties:
        data_connector_name:
